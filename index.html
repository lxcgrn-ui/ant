<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM CORE</title>
    <style>
        :root {
            --bg-base: #020617;
            --panel-bg: rgba(15, 23, 42, 0.45);
            --panel-border: rgba(255, 255, 255, 0.06);
            --accent-cyan: #06b6d4;
            --accent-purple: #a855f7;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #64748b;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            z-index: -2;
        }
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 25px 25px;
            z-index: -1;
        }
        .navbar {
            width: 100%;
            height: 85px;
            background: rgba(2, 6, 23, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--panel-border);
            display: table;
            padding: 0 50px;
        }
        .nav-cell {
            display: table-cell;
            vertical-align: middle;
        }
        .nav-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-wrapper {
            max-width: 1500px;
            margin: 50px auto;
            padding: 0 30px;
        }
        .hero-section {
            text-align: center;
            margin-bottom: 50px;
        }
        .hero-title {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #ffffff;
            margin-bottom: 15px;
        }
        .hero-desc {
            color: var(--text-muted);
            font-size: 16px;
        }
        .workspace-grid {
            display: table;
            width: 100%;
            table-layout: fixed;
            border-collapse: separate;
            border-spacing: 30px 0;
        }
        .workspace-col {
            display: table-cell;
            width: 50%;
            vertical-align: top;
        }
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }
        .panel-header {
            margin-bottom: 30px;
        }
        .panel-title-text {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--accent-cyan);
        }
        .panel-title-text.output-type {
            color: var(--accent-purple);
        }
        .editor-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 10px;
        }
        textarea {
            width: 100%;
            height: 520px;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: #f1f5f9;
            font-family: monospace;
            font-size: 15px;
            line-height: 1.7;
            padding: 10px;
        }
        .action-zone {
            text-align: center;
            margin-top: 40px;
        }
        .btn-quantum {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue), var(--accent-purple));
            background-size: 200% auto;
            color: #ffffff;
            border: none;
            outline: none;
            padding: 18px 60px;
            font-size: 17px;
            font-weight: 800;
            letter-spacing: 2px;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 12px 35px rgba(6, 182, 212, 0.25);
            transition: all 0.4s ease;
        }
        .btn-quantum:hover {
            background-position: right center;
            box-shadow: 0 18px 45px rgba(168, 85, 247, 0.4);
            transform: translateY(-2px);
        }
        .btn-quantum:active {
            transform: translateY(1px);
        }
        .status-bar {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

            <div class="hero-title">高階端對端網頁防護矩陣</div>

                <div class="glass-panel">
                    <div class="panel-header">
                        <span class="panel-title-text">原始程式碼輸入終端</span>
                    </div>
                    <div class="editor-container">
                        <textarea id="inputTerminal" placeholder="Input source code here..."></textarea>

                        <button class="btn-quantum" onclick="executeQuantumEncryption()">執行矩陣虛擬化加密</button>

    <script>
        async function executeQuantumEncryption() {
            const codeInput = document.getElementById('inputTerminal').value.trim();
            const statusLabel = document.getElementById('processStatus');
            const outputTerminal = document.getElementById('outputTerminal');
            if(!codeInput) {
                statusLabel.innerHTML = 'ERROR';
                return;
            }
            statusLabel.innerHTML = 'PROCESSING...';
            try {
                const response = await fetch('/api/encrypt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: codeInput })
                });
                if(!response.ok) throw new Error('Fault');
                const data = await response.json();
                outputTerminal.value = data.result;
                statusLabel.innerHTML = 'SUCCESS';
            } catch(e) {
                statusLabel.innerHTML = 'FAILED';
            }
        }
    </script>
